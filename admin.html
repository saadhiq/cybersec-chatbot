<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* ── LOGIN ── */
        #login-screen { background: white; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        #login-screen h2 { margin-bottom: 20px; color: #1a1a2e; }
        #login-screen input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        #login-screen button { width: 100%; padding: 10px; background: #533AB7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

        /* ── APP SHELL ── */
        #app { display: none; width: 100vw; height: 100vh; flex-direction: column; }

        /* ── TOP BAR ── */
        #topbar { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        #topbar h2 { color: white; font-size: 15px; font-weight: 500; }
        #logout-btn { padding: 8px 16px; background: transparent; color: #888; border: 1px solid #333; border-radius: 8px; cursor: pointer; font-size: 13px; }
        #logout-btn:hover { border-color: #e24b4a; color: #e24b4a; }

        /* ── MAIN CONTENT ── */
        #main { display: flex; flex: 1; overflow: hidden; }

        /* ── USERS PANEL ── */
        #users-panel { width: 280px; background: white; border-right: 1px solid #eee; display: flex; flex-direction: column; flex-shrink: 0; }
        #search-bar { padding: 12px; border-bottom: 1px solid #eee; }
        #search-input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; outline: none; }
        #search-input:focus { border-color: #533AB7; }
        #users-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: #f8f8ff; }
        .user-item.active { background: #f0edff; border-left: 3px solid #533AB7; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #533AB7; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; flex-shrink: 0; }
        .user-info { flex: 1; }
        .user-name { font-size: 14px; color: #1a1a2e; font-weight: 500; }
        .user-joined { font-size: 11px; color: #aaa; margin-top: 2px; }
        .no-results { padding: 20px; text-align: center; color: #aaa; font-size: 13px; }

        /* ── SESSIONS PANEL ── */
        #sessions-panel { flex: 1; overflow-y: auto; padding: 24px; background: #f0f2f5; }
        #sessions-header { margin-bottom: 16px; }
        #sessions-header h3 { font-size: 16px; color: #1a1a2e; }
        #sessions-header p { font-size: 13px; color: #888; margin-top: 4px; }
        .empty-sessions { text-align: center; color: #aaa; margin-top: 80px; font-size: 14px; }

        /* ── SESSION CARD ── */
        .session-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .session-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .session-card-header h4 { font-size: 14px; color: #1a1a2e; }
        .session-date { font-size: 12px; color: #aaa; }
        .score-badge { display: inline-block; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 500; margin-bottom: 10px; }
        .score-high { background: #e1f5ee; color: #0f6e56; }
        .score-mid  { background: #faeeda; color: #854f0b; }
        .score-low  { background: #fcebeb; color: #a32d2d; }
        .score-none { background: #f1efe8; color: #5f5e5a; }
        .summary-text { font-size: 13px; color: #555; line-height: 1.6; margin-bottom: 12px; }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; }
        .tag-strength { background: #e1f5ee; color: #0f6e56; }
        .tag-gap { background: #fcebeb; color: #a32d2d; }
        .summarize-btn { padding: 8px 16px; background: #533AB7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .summarize-btn:disabled { background: #aaa; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
    <h2>🛡️ Admin Dashboard</h2>
    <input type="text" id="username" placeholder="Admin username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- App -->
<div id="app">
    <!-- Top Bar -->
    <div id="topbar">
        <h2>🛡️ CyberSec Admin Dashboard</h2>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Main -->
    <div id="main">
        <!-- Users Panel -->
        <div id="users-panel">
            <div id="search-bar">
                <input type="text" id="search-input" placeholder="🔍 Search students..." oninput="searchUsers(this.value)">
            </div>
            <div id="users-list"></div>
        </div>

        <!-- Sessions Panel -->
        <div id="sessions-panel">
            <div class="empty-sessions">👈 Select a student to view their sessions</div>
        </div>
    </div>
</div>

<script>
    const BASE = 'http://127.0.0.1:8000';
    let selectedUsername = null;
    let searchTimeout = null;

    // ── AUTH ───────────────────────────────────────────
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch(`${BASE}/api/auth/login/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.access) {
            localStorage.setItem('token', data.access);
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            await loadUsers();
        } else {
            alert('Login failed. Are you an admin?');
        }
    }

    function logout() {
        localStorage.removeItem('token');
        selectedUsername = null;
        document.getElementById('app').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    // ── USERS ──────────────────────────────────────────
    async function loadUsers(search = '') {
        const res = await fetch(`${BASE}/api/admin/users/?search=${search}`, {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const data = await res.json();
        renderUsers(data.users);
    }

    function searchUsers(value) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadUsers(value), 300);
    }

    function renderUsers(users) {
        const list = document.getElementById('users-list');
        list.innerHTML = '';
        if (users.length === 0) {
            list.innerHTML = '<div class="no-results">No students found</div>';
            return;
        }
        users.forEach(user => {
            const div = document.createElement('div');
            div.className = 'user-item' + (user.username === selectedUsername ? ' active' : '');
            div.innerHTML = `
                <div class="user-avatar">${user.username[0].toUpperCase()}</div>
                <div class="user-info">
                    <div class="user-name">${user.username}</div>
                    <div class="user-joined">Joined ${new Date(user.date_joined).toLocaleDateString()}</div>
                </div>
            `;
            div.onclick = () => loadUserSessions(user.username);
            list.appendChild(div);
        });
    }

    // ── SESSIONS ───────────────────────────────────────
    async function loadUserSessions(username) {
        selectedUsername = username;
        await loadUsers(document.getElementById('search-input').value);

        const res = await fetch(`${BASE}/api/admin/users/${username}/sessions/`, {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const data = await res.json();
        renderSessions(username, data.sessions);
    }

    function renderSessions(username, sessions) {
        const panel = document.getElementById('sessions-panel');
        panel.innerHTML = `
            <div id="sessions-header">
                <h3>👤 ${username}</h3>
                <p>${sessions.length} session${sessions.length !== 1 ? 's' : ''}</p>
            </div>
        `;

        if (sessions.length === 0) {
            panel.innerHTML += '<div class="empty-sessions">No sessions yet for this student</div>';
            return;
        }

        sessions.forEach(session => {
            const score = session.score;
            const scoreClass = score === null ? 'score-none'
                             : score >= 75   ? 'score-high'
                             : score >= 50   ? 'score-mid'
                             :                 'score-low';
            const scoreLabel = score === null ? 'Not scored yet' : `Score: ${score}/100`;

            const card = document.createElement('div');
            card.className = 'session-card';
            card.id = `session-${session.id}`;
            card.innerHTML = `
                <div class="session-card-header">
                    <h4>Session #${session.id}</h4>
                    <span class="session-date">${new Date(session.started_at).toLocaleString()}</span>
                </div>
                <div class="score-badge ${scoreClass}">${scoreLabel}</div>
                <p class="summary-text">${session.summary || 'No summary yet'}</p>
                <button class="summarize-btn" onclick="summarize(${session.id}, this, '${username}')">
                    ${score === null ? 'Summarize & Score' : 'Re-analyse'}
                </button>
            `;
            panel.appendChild(card);
        });
    }

    async function summarize(sessionId, btn, username) {
        btn.disabled = true;
        btn.textContent = 'Analysing...';
        const res = await fetch(`${BASE}/api/admin/${sessionId}/summarize/`, {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const result = await res.json();
        await loadUserSessions(username);
    }
</script>

</body>
</html>

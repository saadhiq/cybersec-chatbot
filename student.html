<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CyberSec Tutor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #login-screen { background: white; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        #login-screen h2 { margin-bottom: 20px; color: #1a1a2e; }
        #login-screen input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        #login-screen button { width: 100%; padding: 10px; background: #185FA5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }

        #chat-screen { display: none; flex-direction: column; width: 700px; height: 90vh; background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
        #chat-header { padding: 16px 20px; background: #185FA5; color: white; font-weight: 500; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { background: #185FA5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .assistant { background: #f0f2f5; color: #1a1a2e; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #input-area { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 10px; }
        #input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        #input-area button { padding: 10px 20px; background: #185FA5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        #input-area button:disabled { background: #aaa; cursor: not-allowed; }
        #mic-btn { padding: 10px 14px; background: #1D9E75; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #mic-btn.listening { background: #e24b4a; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<!-- Login/Register Screen -->
<div id="login-screen">
    <h2>🔐 CyberSec Tutor</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="registerUser()" style="margin-top:8px;background:#1D9E75">Register</button>
</div>

<!-- Login Screen -->
<!-- <div id="login-screen">
    <h2>🔐 CyberSec Tutor</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div> -->

<!-- Chat Screen -->
<div id="chat-screen">
    <div id="chat-header">CyberSec Tutor — Ask me anything about cybersecurity</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ask a cybersecurity question..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button id="mic-btn" onclick="startVoice()" title="Speak">🎤</button>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const BASE = 'http://127.0.0.1:8000';
    let sessionId = null;

    // ── Register ──────────────────────────────────────────
    async function registerUser() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const res = await fetch(`${BASE}/api/auth/register/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();
        if (data.message) {
            alert('Account created! You can now login.');
        } else {
            alert(data.error);
        }
        }

    // ── LOGIN ──────────────────────────────────────────
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const res = await fetch(`${BASE}/api/auth/login/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.access) {
            localStorage.setItem('token', data.access);
            await startSession();
            showChatScreen();
        } else {
            alert('Login failed. Check your username and password.');
        }
    }

    // ── START SESSION ──────────────────────────────────
    async function startSession() {
        const res = await fetch(`${BASE}/api/chat/start/`, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                'Content-Type': 'application/json'
            }
        });
        const data = await res.json();
        sessionId = data.session_id;
    }

    // ── SEND MESSAGE ───────────────────────────────────
    async function sendMessage() {
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const text = input.value.trim();
        if (!text) return;

        // Show student's message immediately
        addMessage(text, 'user');
        input.value = '';
        btn.disabled = true;
        btn.textContent = 'Thinking...';

        const res = await fetch(`${BASE}/api/chat/${sessionId}/message/`, {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ content: text })
        });

        const data = await res.json();
        addMessage(data.reply, 'assistant');

        btn.disabled = false;
        btn.textContent = 'Send';
    }

    // ── HELPERS ────────────────────────────────────────
    function addMessage(text, role) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${role}`;
        if (role === 'assistant') {
            div.innerHTML = marked.parse(text);
        } else {
            div.textContent = text;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function showChatScreen() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
    }

    function startVoice() {
        const btn = document.getElementById('mic-btn');
        const input = document.getElementById('user-input');

        const recognition = new webkitSpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        btn.classList.add('listening');
        btn.textContent = '⏹️';

        recognition.start();

        recognition.onresult = function(event) {
            const spokenText = event.results[0][0].transcript;
            input.value = spokenText;
            btn.classList.remove('listening');
            btn.textContent = '🎤';
        };

        recognition.onerror = function() {
            btn.classList.remove('listening');
            btn.textContent = '🎤';
            alert('Could not hear you. Please try again.');
        };
    }
</script>

</body>
</html>
